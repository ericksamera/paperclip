<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Paperclip Options</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; max-width: 720px; }
    label { display:block; margin: 12px 0 4px; font-weight: 600; }
    input[type=text] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
    button { margin-top: 12px; padding: 10px 14px; border: 0; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Paperclip — Options</h1>
  <label for="serverUrl">Server URL (e.g., http://127.0.0.1:8000)</label>
  <input id="serverUrl" type="text" placeholder="http://127.0.0.1:8000">

  <button id="saveBtn">Save</button>
  <span id="status" style="margin-left:10px;"></span>

  <script src="options.js"></script>
</body>
</html>
